<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0D3D35"/>
  <!-- Scales of justice -->
  <!-- Center pole -->
  <line x1="16" y1="7" x2="16" y2="26" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top bar -->
  <line x1="7" y1="10" x2="25" y2="10" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top knob -->
  <circle cx="16" cy="7" r="1.2" fill="#C9A84C"/>
  <!-- Base -->
  <line x1="12" y1="26" x2="20" y2="26" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left chain -->
  <line x1="7" y1="10" x2="7" y2="16" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="25" y1="10" x2="25" y2="16" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M4 16 Q7 19 10 16" stroke="#C9A84C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M22 16 Q25 19 28 16" stroke="#C9A84C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
